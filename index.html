<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ben Keith Music</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="page-wrapper">

    <header id="site-header">
      <h1 id="site-title">Ben Keith Music</h1>
    </header>
    <div id="version-bar"></div>

    <div id="sort-controls">
      <div class="sort-group">
        <span class="sort-label">Sort by:</span>
        <button class="sort-btn active" data-sort="title">Title</button>
        <button class="sort-btn" data-sort="date">Date</button>
      </div>
      <div class="category-group">
        <span class="sort-label">Filter:</span>
        <button class="sort-btn cat-btn active" data-cat="all">All</button>
        <button class="sort-btn cat-btn" data-cat="V">Vocal</button>
        <button class="sort-btn cat-btn" data-cat="L">Cello</button>
        <button class="sort-btn cat-btn" data-cat="C">Christmas</button>
        <button class="sort-btn cat-btn" data-cat="G">Game</button>
        <button class="sort-btn cat-btn" data-cat="R">Hymn</button>
        <button class="sort-btn cat-btn" data-cat="favorites">★ Favorites</button>
      </div>
    </div>

    <div id="song-list">
      <!-- Songs rendered by app.js -->
    </div>

    <section id="signup-section">
      <h2>Stay Updated</h2>
      <p>Enter your email to be notified when new recordings are added.</p>
      <form
        id="email-form"
        action="https://buttondown.com/api/emails/embed-subscribe/lordricker"
        method="post"
        target="popupwindow"
        onsubmit="window.open('https://buttondown.com/lordricker','popupwindow')"
      >
        <div class="email-row">
          <input type="email" name="email" placeholder="Your email address" required />
          <button type="submit">Subscribe</button>
        </div>
      </form>
    </section>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
